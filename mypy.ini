[mypy]
python_version = 3.12
ignore_missing_imports = True
check_untyped_defs = True
explicit_package_bases = True
files = custom_components

# The integration code predates this setup and has untyped public
# surfaces plus a couple of genuine type bugs tracked as separate
# findings in the initial code review (C1, and sensor._device access).
# Suppress errors here until those findings are addressed; the override
# should shrink as each fix lands.
[mypy-custom_components.comwatt.*]
ignore_errors = True
